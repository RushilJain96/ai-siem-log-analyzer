# Render Blueprint (infrastructure-as-code) for Orion.
#
#   Render dashboard -> New -> Blueprint -> point at this repo.
#
# It provisions two linked resources:
#   - a Docker web service built from ./Dockerfile
#   - a managed PostgreSQL instance
# and wires the DB's connection string into the app as DATABASE_URL — the
# single 12-factor knob. Nothing else changes to move off local SQLite.
#
# No secrets live here: the DB password is generated by Render and injected
# via `fromDatabase`, never committed.
services:
  - type: web
    name: orion-siem
    # Region is IMMUTABLE after creation and must match the database's, so
    # the app can reach Postgres over Render's private same-region network
    # (the fromDatabase connectionString below). Singapore is the closest
    # Render region to India; the default (Oregon/US-West) would add ~200ms.
    region: singapore
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # Render's own HTTP health check. /health does a real SELECT 1, so a
    # green check also proves the database is reachable.
    healthCheckPath: /health
    envVars:
      # Managed Postgres connection string, injected by Render. It may
      # arrive as postgres://…; core/config.py normalizes that to
      # postgresql:// for SQLAlchemy 2.0.
      - key: DATABASE_URL
        fromDatabase:
          name: orion-db
          property: connectionString
      # Fail closed if the image somehow ships without an integrity-verified
      # model — a deployed "AI SIEM" must never run silently model-less.
      - key: MODEL_REQUIRED
        value: "true"
      - key: APP_ENV
        value: render
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: orion-db
    # MUST match the web service's region (immutable) for the private
    # internal connection string to work.
    region: singapore
    plan: free
    databaseName: siem
    user: siem
